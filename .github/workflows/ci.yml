name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund --ignore-scripts

      - name: Lint (Biome)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (Vitest) with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage
          path: coverage
          retention-days: 7

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: pokedex-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image serves the SPA
        run: |
          set -euo pipefail
          # IP backend so nginx boots without the api container present.
          docker run -d --rm -p 8080:80 -e BACKEND_URL=http://127.0.0.1:3000 --name web pokedex-web:ci
          for i in $(seq 1 10); do
            if curl -sf -o /dev/null http://localhost:8080/; then break; fi
            sleep 1
          done
          curl -sf http://localhost:8080/ | grep -q '<div id="root">'
          # SPA fallback returns index.html for unknown routes
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/some/route)" = "200"
          docker stop web

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: quality
    steps:
      - uses: actions/checkout@v6

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom

      - name: Scan SBOM for vulnerabilities (grype)
        uses: anchore/scan-action@v3
        with:
          sbom: sbom.cdx.json
          fail-build: false
          severity-cutoff: high

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality
    # Requires SONAR_TOKEN secret in repo settings. Skip on forks.
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm install --no-audit --no-fund --ignore-scripts

      - run: npm run test:coverage

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v3
        if: ${{ env.SONAR_TOKEN != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  snyk:
    name: Snyk
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: quality
    # Requires SNYK_TOKEN secret. Skip on forks.
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v6

      - uses: snyk/actions/setup@master

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: npm install --no-audit --no-fund --ignore-scripts

      - name: Snyk test
        if: ${{ env.SNYK_TOKEN != '' }}
        run: snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
