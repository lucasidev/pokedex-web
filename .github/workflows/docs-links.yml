name: Docs links

on:
  pull_request:
    paths:
      - "**.md"
      - ".github/lychee.toml"
      - ".github/workflows/docs-links.yml"
  push:
    branches: [master, main]
    paths:
      - "**.md"
      - ".github/lychee.toml"

permissions:
  contents: read

concurrency:
  group: docs-links-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check markdown links
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Restore lychee cache
        uses: actions/cache@v5
        with:
          path: .lycheecache
          key: lychee-${{ runner.os }}-${{ hashFiles('.github/lychee.toml') }}
          restore-keys: |
            lychee-${{ runner.os }}-

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config .github/lychee.toml --no-progress './**/*.md'
          fail: true
